<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BGA · Étape 0 — Accueil · V1 Carte centrée</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#f5f0eb; --surface:#ffffff;
    --ink:#1a1a1a; --ink2:#4a4a4a;
    --blue:#04a7ff; --blue-d:#164d73; --blue-soft:#E6F1FB;
    --yellow:#F5C842; --red:#E53935;
    --shadow:4px 4px 0 0 var(--ink);
    --shadow-sm:3px 3px 0 0 var(--ink);
    --shadow-lg:6px 6px 0 0 var(--ink);
    --r:14px; --pill:99px;
    --font:'Bricolage Grotesque',system-ui,sans-serif;
  }
  html,body{width:100%;height:100%;}
  body{
    width:1440px;height:900px;overflow:hidden;position:relative;
    background:var(--bg);font-family:var(--font);color:var(--ink);
    display:flex;flex-direction:column;
  }

  /* ---------- header ---------- */
  header{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:24px 48px;}
  .brand{display:flex;align-items:center;gap:13px;}
  .brand .mark{width:46px;height:46px;background:var(--blue);border:3px solid var(--ink);
    border-radius:12px;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:26px;transform:rotate(-5deg);}
  .brand .name{font-weight:800;font-size:21px;letter-spacing:-.02em;}
  .brand .name b{color:var(--blue);}

  .lang{display:inline-flex;border:3px solid var(--ink);border-radius:var(--pill);
    overflow:hidden;background:#fff;box-shadow:var(--shadow-sm);}
  .lang button{font-family:var(--font);font-weight:700;font-size:14px;letter-spacing:.04em;
    padding:9px 18px;border:none;cursor:pointer;background:transparent;color:var(--ink2);
    transition:background .12s,color .12s;}
  .lang button.active{background:var(--ink);color:#fff;}

  /* ---------- step rail ---------- */
  .rail{position:relative;z-index:5;display:flex;justify-content:center;gap:10px;padding:4px 0 6px;}
  .rail .step{display:flex;align-items:center;gap:9px;font-weight:700;font-size:13px;
    color:var(--ink2);padding:7px 15px;border:2.5px solid transparent;border-radius:var(--pill);}
  .rail .step .num{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--ink2);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .rail .step.active{background:var(--yellow);border-color:var(--ink);color:var(--ink);box-shadow:var(--shadow-sm);}
  .rail .step.active .num{border-color:var(--ink);background:var(--ink);color:#fff;}
  .rail .sep{align-self:center;color:#cdc4b6;font-size:18px;}

  /* ---------- main ---------- */
  main{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;}
  .card{position:relative;width:620px;background:var(--surface);border:3px solid var(--ink);
    border-radius:24px;box-shadow:var(--shadow-lg);padding:84px 60px 52px;text-align:center;
    margin-top:54px;}

  /* mascot perched on top */
  .mascot{position:absolute;top:-118px;left:50%;transform:translateX(-50%);width:170px;z-index:3;}
  .bubble{position:absolute;top:6px;left:calc(50% + 96px);transform:rotate(2deg);
    background:var(--yellow);border:3px solid var(--ink);border-radius:16px;box-shadow:var(--shadow-sm);
    padding:12px 16px;font-weight:700;font-size:15px;white-space:nowrap;z-index:4;}
  .bubble::after{content:"";position:absolute;left:-13px;top:22px;width:0;height:0;
    border:11px solid transparent;border-right-color:var(--ink);}
  .bubble::before{content:"";position:absolute;left:-8px;top:24px;width:0;height:0;z-index:1;
    border:9px solid transparent;border-right-color:var(--yellow);}

  h1{font-weight:800;font-size:42px;line-height:1.04;letter-spacing:-.025em;margin-bottom:14px;text-wrap:balance;}
  .sub{font-weight:500;font-size:18px;line-height:1.5;color:var(--ink2);max-width:42ch;margin:0 auto 34px;}

  .field{text-align:left;max-width:440px;margin:0 auto;}
  .field label{display:block;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--ink2);margin-bottom:9px;}
  .input-wrap{display:flex;align-items:center;gap:12px;background:var(--bg);border:3px solid var(--ink);
    border-radius:var(--r);padding:0 16px;box-shadow:var(--shadow);transition:box-shadow .12s,transform .12s;}
  .input-wrap:focus-within{box-shadow:6px 6px 0 0 var(--blue);}
  .input-wrap i{font-size:24px;color:var(--blue);}
  .input-wrap input{flex:1;border:none;outline:none;background:transparent;font-family:var(--font);
    font-weight:700;font-size:22px;color:var(--ink);padding:16px 0;}
  .input-wrap input::placeholder{color:#b3aa9b;font-weight:500;}
  .count{font-weight:700;font-size:13px;color:#b3aa9b;font-variant-numeric:tabular-nums;}

  .cta-row{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:30px;}
  .cta{display:inline-flex;align-items:center;gap:11px;font-family:var(--font);font-weight:800;
    font-size:19px;color:#fff;background:var(--blue);border:3px solid var(--ink);border-radius:var(--pill);
    box-shadow:var(--shadow);padding:16px 40px;cursor:pointer;white-space:nowrap;
    transition:transform .11s,box-shadow .11s,background .11s,opacity .12s;}
  .cta i{font-size:22px;}
  .cta:not(:disabled):hover{background:var(--blue-d);}
  .cta:not(:disabled):active{transform:translate(4px,4px);box-shadow:0 0 0 0 var(--ink);}
  .cta:disabled{background:#cfc6b8;color:#fff;cursor:not-allowed;box-shadow:var(--shadow);opacity:1;}
  .hint{font-weight:600;font-size:13.5px;color:var(--ink2);display:flex;align-items:center;gap:7px;min-height:20px;}
  .hint i{font-size:17px;}
  .hint.ok{color:var(--blue);}

  /* floating decor pieces */
  .decor{position:absolute;z-index:1;border:3px solid var(--ink);box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;}
  .d1{width:64px;height:64px;background:var(--red);border-radius:14px;top:130px;left:170px;transform:rotate(-12deg);}
  .d2{width:58px;height:58px;background:var(--yellow);border-radius:50%;color:var(--ink);bottom:150px;left:230px;transform:rotate(8deg);}
  .d3{width:70px;height:70px;background:var(--blue);border-radius:14px;bottom:120px;right:190px;transform:rotate(11deg);}
  .d4{width:52px;height:52px;background:#fff;border-radius:12px;color:var(--ink);top:160px;right:230px;transform:rotate(-8deg);}

  /* zigzag bottom strip */
  .zig{position:absolute;left:0;right:0;bottom:0;height:34px;z-index:1;
    background:var(--blue);
    -webkit-mask:linear-gradient(135deg,#000 50%,transparent 0) repeat-x 0 0/34px 34px,
                 linear-gradient(-135deg,#000 50%,transparent 0) repeat-x 0 0/34px 34px;
    mask:linear-gradient(135deg,#000 50%,transparent 0) repeat-x 0 0/34px 34px,
         linear-gradient(-135deg,#000 50%,transparent 0) repeat-x 0 0/34px 34px;}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="assets/logo.svg" alt="Boardgame Arena" style="height:42px;width:auto;display:block;" />
    </div>
    <div class="lang" id="lang">
      <button data-lang="fr" class="active">FR</button>
      <button data-lang="en">EN</button>
    </div>
  </header>

  <main>
    <span class="decor d1"><i class="ti ti-sword"></i></span>
    <span class="decor d2"><i class="ti ti-dice-3"></i></span>
    <span class="decor d3"><i class="ti ti-crown"></i></span>
    <span class="decor d4"><i class="ti ti-puzzle"></i></span>

    <div class="card">
      <div class="mascot" id="mascot-slot"></div>
      <div class="bubble" id="bubble" data-i18n="bubble">Bienvenue, nouveau joueur&nbsp;!</div>

      <h1 data-i18n="head">Avant de jouer,<br>comment on t'appelle&nbsp;?</h1>
      <p class="sub" data-i18n="sub">Pas d'email, pas de blabla. Juste un surnom pour entrer dans l'arène.</p>

      <div class="field">
        <label for="nick" data-i18n="label">Ton surnom de joueur</label>
        <div class="input-wrap">
          <i class="ti ti-user-star"></i>
          <input id="nick" type="text" maxlength="16" autocomplete="off"
                 data-i18n-ph="ph" placeholder="Ex : DéChanceux, ReineDuBluff…" />
          <span class="count" id="count">0/16</span>
        </div>
      </div>

      <div class="cta-row">
        <button class="cta" id="go" disabled>
          <span data-i18n="cta">C'est parti</span><i class="ti ti-arrow-up-right"></i>
        </button>
        <span class="hint" id="hint">
          <i class="ti ti-info-circle"></i><span data-i18n="hint">Choisis un surnom pour continuer</span>
        </span>
      </div>
    </div>
  </main>

  

<!-- ===== mascot SVG (reused) ===== -->
<template id="mascot-tpl">
<svg viewBox="0 0 200 230" width="170" aria-hidden="true">
  <!-- shadow -->
  <ellipse cx="104" cy="214" rx="62" ry="11" fill="#1a1a1a" opacity=".18"/>
  <!-- legs -->
  <rect x="72" y="168" width="20" height="42" rx="10" fill="#04a7ff" stroke="#1a1a1a" stroke-width="5"/>
  <rect x="108" y="168" width="20" height="42" rx="10" fill="#04a7ff" stroke="#1a1a1a" stroke-width="5"/>
  <!-- waving left arm -->
  <g class="wave" style="transform-origin:54px 120px;">
    <rect x="22" y="92" width="20" height="56" rx="10" fill="#04a7ff" stroke="#1a1a1a" stroke-width="5" transform="rotate(28 40 120)"/>
  </g>
  <!-- right arm -->
  <rect x="158" y="108" width="20" height="54" rx="10" fill="#04a7ff" stroke="#1a1a1a" stroke-width="5" transform="rotate(-14 168 134)"/>
  <!-- body (rounded die) -->
  <rect x="44" y="60" width="112" height="116" rx="28" fill="#04a7ff" stroke="#1a1a1a" stroke-width="6"/>
  <!-- belly pip cluster (die face) -->
  <circle cx="74" cy="150" r="5.5" fill="#F5C842"/>
  <circle cx="126" cy="150" r="5.5" fill="#F5C842"/>
  <!-- eyes -->
  <circle cx="80" cy="104" r="17" fill="#fff" stroke="#1a1a1a" stroke-width="5"/>
  <circle cx="120" cy="104" r="17" fill="#fff" stroke="#1a1a1a" stroke-width="5"/>
  <circle class="pupil" cx="84" cy="107" r="7" fill="#1a1a1a"/>
  <circle class="pupil" cx="124" cy="107" r="7" fill="#1a1a1a"/>
  <!-- smile -->
  <path d="M82 132 q18 16 36 0" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="62" cy="126" r="6" fill="#E53935" opacity=".5"/>
  <circle cx="138" cy="126" r="6" fill="#E53935" opacity=".5"/>
  <!-- little yellow die hat -->
  <rect x="86" y="22" width="38" height="38" rx="11" fill="#F5C842" stroke="#1a1a1a" stroke-width="5" transform="rotate(-12 105 41)"/>
  <circle cx="98" cy="35" r="3.4" fill="#1a1a1a"/>
  <circle cx="112" cy="47" r="3.4" fill="#1a1a1a"/>
</svg>
</template>

<style>
  @keyframes wavehand{0%,70%,100%{transform:rotate(0deg);}80%,90%{transform:rotate(-16deg);}}
  @media (prefers-reduced-motion:no-preference){
    .wave{animation:wavehand 2.8s ease-in-out infinite;}
  }
</style>

<script>
  // inject mascot
  document.getElementById('mascot-slot').appendChild(
    document.getElementById('mascot-tpl').content.cloneNode(true));

  const I18N = {
    fr:{
      r0:"Accueil",r1:"Préférences",r2:"Personnalité",r3:"Profil",
      bubble:"Bienvenue, nouveau joueur&nbsp;!",
      bubbleNamed:"Salut, {n}&nbsp;! Joli surnom 👋",
      head:"Avant de jouer,<br>comment on t'appelle&nbsp;?",
      sub:"Pas d'email, pas de blabla. Juste un surnom pour entrer dans l'arène.",
      label:"Ton surnom de joueur",
      ph:"Ex : DéChanceux, ReineDuBluff…",
      cta:"C'est parti",
      hint:"Choisis un surnom pour continuer",
      hintOk:"Parfait, {n} — on peut y aller !"
    },
    en:{
      r0:"Welcome",r1:"Preferences",r2:"Personality",r3:"Profile",
      bubble:"Welcome, new player!",
      bubbleNamed:"Hey, {n}! Great handle 👋",
      head:"Before we play,<br>what should we call you?",
      sub:"No email, no fuss. Just a nickname to step into the arena.",
      label:"Your player nickname",
      ph:"e.g. LuckyDice, BluffQueen…",
      cta:"Let's go",
      hint:"Pick a nickname to continue",
      hintOk:"Perfect, {n} — let's roll!"
    }
  };

  let lang='fr';
  const nick=document.getElementById('nick');
  const go=document.getElementById('go');
  const hint=document.getElementById('hint');
  const hintTxt=hint.querySelector('[data-i18n]');
  const hintIcon=hint.querySelector('i');
  const bubble=document.getElementById('bubble');
  const count=document.getElementById('count');

  function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function render(){
    const d=I18N[lang];
    const name=nick.value.trim();
    const valid=name.length>=2;
    document.documentElement.lang=lang;

    document.querySelectorAll('[data-i18n]').forEach(el=>{
      const k=el.getAttribute('data-i18n'); if(d[k]!=null) el.innerHTML=d[k];
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
      const k=el.getAttribute('data-i18n-ph'); if(d[k]!=null) el.placeholder=d[k];
    });

    // bubble + hint react to the name
    bubble.innerHTML = name ? d.bubbleNamed.replace('{n}',esc(name)) : d.bubble;
    go.disabled=!valid;
    if(valid){
      hint.classList.add('ok');
      hintIcon.className='ti ti-circle-check-filled';
      hintTxt.innerHTML=d.hintOk.replace('{n}',esc(name));
    }else{
      hint.classList.remove('ok');
      hintIcon.className='ti ti-info-circle';
      hintTxt.innerHTML=d.hint;
    }
    count.textContent=name.length+'/16';
  }

  nick.addEventListener('input',render);
  nick.addEventListener('keydown',e=>{if(e.key==='Enter'&&!go.disabled)go.click();});
  go.addEventListener('click',()=>{
    try{localStorage.setItem('bga_nick',nick.value.trim());}catch(e){}
    window.location.href='acte-1.html';
  });

  document.querySelectorAll('#lang button').forEach(b=>{
    b.addEventListener('click',()=>{lang=b.dataset.lang;
      document.querySelectorAll('#lang button').forEach(x=>x.classList.toggle('active',x===b));
      render();
      try{localStorage.setItem('bga_lang',lang);}catch(e){}
    });
  });

  try{
    lang=localStorage.getItem('bga_lang')||'fr';
    document.querySelectorAll('#lang button').forEach(x=>x.classList.toggle('active',x.dataset.lang===lang));
    const sn=localStorage.getItem('bga_nick'); if(sn) nick.value=sn;
  }catch(e){}
  render();
</script>
</body>
</html>
