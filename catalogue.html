<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BGA · Home Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#ffffff; --surface:#ffffff; --inset:#f3f1ec; --ink:#1a1a1a; --ink2:#4a4a4a; --ink3:#8a8275;
    --blue:#04a7ff; --blue-d:#164d73; --yellow:#F5C842; --red:#E53935;
    --p:#378ADD; --p-soft:#E6F1FB; --p-text:#0C447C;
    --shadow:4px 4px 0 0 var(--ink); --shadow-sm:3px 3px 0 0 var(--ink); --shadow-lg:6px 6px 0 0 var(--ink);
    --pill:99px; --font:'Bricolage Grotesque',system-ui,sans-serif;
  }
  html{scroll-behavior:smooth;}
  body{background:var(--bg);font-family:var(--font);color:var(--ink);min-height:100vh;}
  .wrap{max-width:1320px;margin:0 auto;padding:0 40px;}
  h2{font-weight:800;letter-spacing:-.02em;}

  /* ---------- TOP UTILITY BAR (noir, discret) ---------- */
  .topbar{position:sticky;top:0;z-index:50;background:var(--ink);color:#fff;}
  .topbar-in{display:flex;align-items:center;gap:16px;height:60px;}
  .top-links{display:flex;gap:2px;margin-right:auto;}
  .top-links a{font-weight:600;font-size:13.5px;color:#c9c3b6;text-decoration:none;padding:6px 12px;border-radius:8px;cursor:pointer;transition:color .12s,background .12s;}
  .top-links a:hover{color:#fff;background:rgba(255,255,255,.1);}
  .top-right{display:flex;align-items:center;gap:12px;}
  .lang{display:inline-flex;border:2px solid #3a362f;border-radius:var(--pill);overflow:hidden;background:#262320;}
  .lang button{font-family:var(--font);font-weight:700;font-size:12.5px;padding:6px 12px;border:none;cursor:pointer;background:transparent;color:#c9c3b6;}
  .lang button.active{background:#fff;color:var(--ink);}
  .collection .mono{width:27px;height:27px;border-radius:50%;background:#fff;color:var(--blue-d);border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin-left:-6px;}

  /* ---------- BARRE UNIQUE : recherche discrète + salle de jeu ---------- */
  .nav-logo{display:flex;align-items:center;}
  .nav-logo img{height:30px;display:block;}
  .top-search{margin-left:auto;display:flex;align-items:center;gap:8px;background:#262320;border:1.5px solid #3a362f;border-radius:var(--pill);padding:0 14px;width:280px;transition:border-color .12s;}
  .top-search:focus-within{border-color:#5a554b;}
  .top-search i{font-size:17px;color:#8a857b;}
  .top-search input{flex:1;border:none;outline:none;background:transparent;font-family:var(--font);font-weight:500;font-size:13.5px;color:#fff;padding:9px 0;}
  .top-search input::placeholder{color:#8a857b;}
  .collection{display:inline-flex;align-items:center;gap:9px;font-family:var(--font);font-weight:800;font-size:14px;color:#fff;background:var(--blue);border:2px solid #000;border-radius:var(--pill);padding:8px 16px;cursor:pointer;white-space:nowrap;transition:transform .11s,background .11s;}
  .collection:hover{background:var(--blue-d);}
  .collection:active{transform:translateY(1px);}

  /* ---------- PROFILE ICON SWITCHER (dans la barre noire) ---------- */
  .ptabs{display:flex;gap:6px;margin-right:4px;}
  .ptab{width:34px;height:34px;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:#c9c3b6;background:#262320;border:2px solid #3a362f;border-radius:50%;cursor:pointer;transition:transform .11s,background .11s,color .11s,border-color .11s;}
  .ptab:hover{color:#fff;transform:translateY(-1px);}
  .ptab.active{background:var(--tc);color:#fff;border-color:#fff;}

  /* ---------- sections ---------- */
  section{margin-top:48px;}
  .sec-head{display:flex;align-items:center;gap:12px;margin-bottom:30px;}
  .sec-head h2{font-size:24px;}
  .kicker{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--p-text);background:var(--p-soft);border:2.5px solid var(--ink);box-shadow:var(--shadow-sm);padding:6px 13px;border-radius:var(--pill);}

  /* ---------- BANNER (coupe-fil) ---------- */
  .banner{position:relative;margin-top:0;width:100vw;margin-left:calc(50% - 50vw);background:var(--ink);border:none;border-radius:0;box-shadow:none;padding:58px 0 104px;color:#fff;overflow:hidden;}
  .banner-ridge{position:absolute;left:0;bottom:-1px;width:100%;height:58px;z-index:4;pointer-events:none;display:block;}
  .banner.priority{box-shadow:none;}
  /* paillettes dorées scintillantes */
  .banner-glitter{position:absolute;inset:0;z-index:0;pointer-events:none;}
  .banner-glitter span{position:absolute;width:7px;height:7px;background:#04a7ff;opacity:0;
    clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);
    animation:sparkle var(--dur,3.4s) ease-in-out var(--del,0s) infinite;}
  @keyframes sparkle{0%,100%{opacity:0;transform:scale(.4) rotate(0deg);}
    45%{opacity:.95;transform:scale(1) rotate(90deg);}
    70%{opacity:.25;transform:scale(.7) rotate(150deg);}}
  .banner-inner{position:relative;z-index:1;}
  .banner-top{display:flex;align-items:center;gap:13px;margin-bottom:42px;}
  .banner-top>div{flex:1;min-width:0;}
  .banner-top .b-ic{width:44px;height:44px;flex:none;border-radius:11px;background:var(--blue);border:2px solid #000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .banner-titrow{display:flex;align-items:center;gap:11px;}
  .banner-top h2{font-size:40px;color:#fff;white-space:nowrap;}
  .banner-top p{font-weight:400;font-size:14px;color:#bdb39c;margin-top:2px;}
  .premium-tag{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-weight:300;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--blue);border:2px solid #000;border-radius:var(--pill);padding:4px 11px;}
  .banner-pulse{margin-left:auto;display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#04a7ff;}
  .banner-pulse .live-dot{width:10px;height:10px;border-radius:50%;background:#04a7ff;border:2px solid #000;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .banner-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;perspective:950px;}
  .live{position:relative;display:block;aspect-ratio:3/4;border:none;border-radius:16px;overflow:hidden;cursor:pointer;background:var(--cc);text-align:left;font-family:var(--font);transform-style:preserve-3d;will-change:transform;box-shadow:none;transition:transform .12s ease,box-shadow .18s ease;}
  .live:hover{box-shadow:0 22px 46px rgba(0,0,0,.6);}
  .live::after{content:"";position:absolute;top:0;left:-75%;width:55%;height:100%;z-index:2;pointer-events:none;
    background:linear-gradient(100deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.45) 50%,rgba(255,255,255,0) 100%);
    transform:skewX(-18deg);transition:left .65s cubic-bezier(.2,.7,.3,1);}
  .live:hover::after{left:130%;}
  .live-art{position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:flex-end;color:rgba(255,255,255,.16);overflow:hidden;pointer-events:none;}
  .live-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none;}
  .live-art i{font-size:130px;transform:translate(18%,-12%) rotate(-8deg);}
  .live-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,7,5,.92) 0%,rgba(8,7,5,.45) 30%,rgba(8,7,5,0) 56%);pointer-events:none;}
  .live-body{position:absolute;left:0;right:0;bottom:0;padding:15px;display:flex;flex-direction:column;gap:4px;color:#fff;transform:translateZ(34px);}
  .live-title{font-weight:800;font-size:18px;}
  .live-desc{display:inline-flex;align-items:center;gap:5px;font-weight:300;font-size:12px;color:#fff;}
  .live-desc i{font-size:14px;}
  .live-join{margin-top:11px;align-self:flex-start;display:inline-flex;align-items:center;gap:7px;font-family:var(--font);font-weight:500;font-size:16px;color:#fff;background:var(--blue);border:2px solid #000;border-radius:var(--pill);padding:8px 15px;cursor:pointer;transition:filter .1s,transform .1s;}
  .live-join:hover{filter:brightness(.94);transform:translateY(-1px);}
  .live-join.joined{background:#173247;color:#04a7ff;}

  /* ---- variante BOÎTE DE JEU réaliste ---- */
  .live.boxed{background:radial-gradient(120% 90% at 50% 30%,#332b1d 0%,#1b1813 60%,#141109 100%);}
  .live.boxed::after{display:none;}
  .box-glow{position:absolute;left:50%;top:42%;width:80%;height:60%;transform:translate(-50%,-50%);z-index:0;pointer-events:none;
    background:radial-gradient(closest-side,rgba(4,167,255,.30),transparent 72%);opacity:.7;transition:opacity .25s;}
  .live.boxed:hover .box-glow{opacity:1;}
  .box-img{position:absolute;left:50%;top:48%;width:80%;height:auto;transform:translate(-50%,-50%) translateZ(40px);
    z-index:2;pointer-events:none;filter:drop-shadow(0 22px 26px rgba(0,0,0,.6)) drop-shadow(0 4px 6px rgba(0,0,0,.4));}
  .box-gloss{position:absolute;top:-10%;left:-55%;width:42%;height:120%;z-index:3;pointer-events:none;
    transform:translateZ(52px) skewX(-16deg);
    background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.0) 30%,rgba(255,255,255,.55) 50%,rgba(255,255,255,0) 70%);
    transition:left .6s cubic-bezier(.2,.7,.3,1);mix-blend-mode:screen;}
  .live.boxed:hover .box-gloss{left:120%;}
  .live.boxed .live-body{background:linear-gradient(to top,rgba(8,7,5,.9) 0%,rgba(8,7,5,.45) 60%,transparent 100%);padding-top:30px;}

  /* ---- étincelle dorée qui file le long de la bordure (hover) ---- */
  @property --spark{syntax:'<angle>';inherits:false;initial-value:0deg;}
  .live::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:5px;z-index:5;pointer-events:none;
    background:conic-gradient(from var(--spark),transparent 0 62%,rgba(4,167,255,.75) 76%,#cfe9ff 86%,#04a7ff 92%,transparent 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;
    mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;
    opacity:0;transition:opacity .18s;}
  .live:hover::before{opacity:1;animation:spark-run 1.15s linear infinite;}
  @keyframes spark-run{to{--spark:360deg;}}
  .gcard{z-index:0;}
  .gcard:hover{z-index:1;}
  .live-join.joined{background:var(--ink);}

  /* ---------- HERO ---------- */
  .hero{background:var(--surface);border:3px solid var(--ink);border-radius:18px;box-shadow:var(--shadow);padding:24px 26px;}
  .hero-head{display:flex;align-items:center;gap:11px;margin-bottom:26px;}
  .hero-head .hero-ic{width:40px;height:40px;flex:none;border-radius:11px;background:var(--p);border:3px solid var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:var(--shadow-sm);}
  .hero-head h2{font-size:21px;}
  .hero-cta{display:inline-flex;align-items:center;gap:9px;font-family:var(--font);font-weight:800;font-size:16px;color:#fff;background:var(--p);border:3px solid var(--ink);border-radius:var(--pill);box-shadow:var(--shadow);padding:13px 24px;cursor:pointer;white-space:nowrap;transition:transform .11s,box-shadow .11s,filter .11s;}
  .hero-cta:hover{filter:brightness(.93);}
  .hero-cta:active{transform:translate(4px,4px);box-shadow:0 0 0 0 var(--ink);}

  /* social hero */
  .fr-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
  .fr-row{display:flex;align-items:center;gap:13px;background:var(--inset);border:2px solid var(--ink);border-radius:12px;padding:11px 15px;}
  .fr-row.off{opacity:.55;}
  .fr-av{position:relative;width:38px;height:38px;border-radius:50%;background:var(--p-soft);border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--p-text);}
  .fr-dot{position:absolute;right:-2px;bottom:-2px;width:12px;height:12px;border-radius:50%;background:var(--red);border:2px solid var(--ink);}
  .fr-row:not(.off) .fr-dot{background:#13CC63;}
  .fr-name{font-weight:800;font-size:15px;}
  .fr-status{font-weight:500;font-size:13px;color:var(--ink2);}
  .fr-invite{margin-left:auto;font-family:var(--font);font-weight:800;font-size:13px;color:var(--p-text);background:var(--p-soft);border:2.5px solid var(--ink);border-radius:var(--pill);box-shadow:var(--shadow-sm);padding:8px 16px;cursor:pointer;transition:transform .1s;}
  .fr-invite:hover{transform:translate(-1px,-1px);}
  .fr-invite[disabled]{opacity:.4;cursor:not-allowed;box-shadow:none;}
  .fr-invite.sent{background:var(--p);color:#fff;}

  /* social hero — groups */
  .hero-social{background:none;border:none;box-shadow:none;padding:0;}
  .grp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .grp-card{display:flex;flex-direction:column;align-items:flex-start;gap:12px;background:var(--inset);border:2.5px solid var(--ink);border-radius:14px;box-shadow:var(--shadow-sm);padding:18px 18px 16px;}
  .grp-ic{width:48px;height:48px;flex:none;border-radius:12px;border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:25px;color:#fff;box-shadow:var(--shadow-sm);}
  .grp-ic.b{background:var(--blue);} .grp-ic.y{background:var(--yellow);color:var(--ink);} .grp-ic.r{background:var(--red);}
  .grp-title{font-weight:800;font-size:16px;line-height:1.18;letter-spacing:-.01em;}
  .grp-desc{font-weight:500;font-size:13px;color:var(--ink2);line-height:1.45;flex:1;}
  .grp-cta{align-self:stretch;justify-content:center;font-size:14px;padding:11px 16px;box-shadow:var(--shadow-sm);}
  .grp-cta:active{transform:translate(2px,2px);box-shadow:0 0 0 0 var(--ink);}

  /* progress hero */
  .keys{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
  .key,.badge-myst{background:var(--inset);border:3px solid var(--ink);border-radius:13px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;position:relative;box-shadow:var(--shadow-sm);}
  .key-ic{width:42px;height:42px;border-radius:11px;background:#d9d0c2;border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;}
  .key.done .key-ic{background:var(--yellow);color:var(--ink);}
  .key.active{border-color:var(--p);box-shadow:4px 4px 0 0 var(--p);}
  .key.active .key-ic{background:var(--p);color:#fff;}
  .key-n{position:absolute;top:-9px;left:-9px;width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .key-l{font-weight:700;font-size:12.5px;line-height:1.2;}
  .key.done .key-l::after{content:' ✓';color:#13CC63;}
  .badge-myst{justify-content:center;border-style:dashed;color:var(--ink3);}
  .badge-myst .bm-ic{width:42px;height:42px;border-radius:50%;background:#e7e0d3;border:2.5px dashed var(--ink3);display:flex;align-items:center;justify-content:center;font-size:24px;filter:blur(.4px);}
  .badge-myst span:last-child{font-weight:700;font-size:12.5px;}
  .xp{margin-bottom:18px;}
  .xp-bar{height:16px;border:2.5px solid var(--ink);border-radius:var(--pill);background:var(--inset);overflow:hidden;}
  .xp-bar span{display:block;height:100%;background:var(--p);}
  .xp-txt{display:block;margin-top:7px;font-weight:700;font-size:13px;color:var(--ink2);}

  /* progress hero — clefs alignées + barre qui rejoint le badge */
  .prog{display:flex;align-items:flex-start;gap:0;margin:16px 0 16px;}
  .stop{position:relative;z-index:1;flex:none;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;}
  .gwrap{position:relative;height:96px;display:flex;align-items:center;justify-content:center;overflow:visible;}
  .seg{flex:1;align-self:flex-start;margin-top:40px;height:16px;margin-left:-15px;margin-right:-15px;border-radius:99px;background:var(--inset);border:2.5px solid var(--ink);z-index:0;}
  .seg.on{background:linear-gradient(180deg,#ffd863,#f0b21f);}
  .gem{position:relative;width:54px;height:60px;flex:none;display:flex;align-items:center;justify-content:center;}
  .gem .rim,.gem .face{position:absolute;clip-path:polygon(50% 0,100% 27%,100% 73%,50% 100%,0 73%,0 27%);}
  .gem .rim{inset:0;background:var(--ink);}
  .gem .face{inset:3px;}
  .gem i{position:relative;z-index:2;font-size:23px;}
  .gem .gn{position:absolute;z-index:3;top:-5px;left:-5px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-weight:800;font-size:11.5px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
  .stop.done .gem{filter:drop-shadow(2px 3px 0 var(--ink)) drop-shadow(0 0 12px rgba(245,200,66,.65));animation:gemShine 2.2s ease-in-out infinite;}
  .stop.done .gem .face{background:radial-gradient(120% 100% at 35% 22%,#ffe27a,#e8a90f 72%);}
  .stop.done .gem i{color:#fff;}
  .stop.next .gem .face,.stop.locked .gem .face{background:linear-gradient(160deg,#dcd6cb,#b1a99a);}
  .stop.next .gem i,.stop.locked .gem i{color:#fff;opacity:.92;}
  .stop.next .gem,.stop.locked .gem{filter:drop-shadow(2px 3px 0 rgba(26,26,26,.28));}
  .klabel{font-weight:700;font-size:12px;line-height:1.22;color:var(--ink);max-width:118px;}
  .stop.next .klabel,.stop.locked .klabel{color:var(--ink3);}
  .kstate{display:inline-flex;align-items:center;gap:4px;font-weight:800;font-size:10px;text-transform:uppercase;letter-spacing:.03em;}
  .kstate i{font-size:13px;}
  .stop.done .kstate{color:#1F8A5B;}
  .stop.next .kstate{color:#B8841A;}
  .stop.locked .kstate{color:var(--ink3);}
  .reward .gwrap{width:104px;}
  .rw-crown{position:absolute;top:-14px;left:50%;transform:translateX(-50%);z-index:4;font-size:24px;color:#b3aa9a;}
  .rw-wing{position:absolute;top:20px;width:66px;height:54px;z-index:0;fill:#c4bcad;opacity:.85;}
  .rw-wing.l{right:50%;margin-right:22px;}
  .rw-wing.r{left:50%;margin-left:22px;transform:scaleX(-1);}
  .reward .gem{width:90px;height:96px;}
  .reward .gem i{font-size:35px;}
  .reward.locked .gem .face{background:radial-gradient(120% 100% at 35% 22%,#e3ddd0,#b1a99a 74%);}
  .reward.locked .gem{filter:drop-shadow(3px 4px 0 rgba(26,26,26,.3));}
  .rw-ribbon{position:relative;z-index:4;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#fff;background:#a59c8d;border:2.5px solid var(--ink);border-radius:7px;padding:4px 13px;box-shadow:2px 2px 0 var(--ink);}
  .rw-count{position:relative;z-index:4;font-weight:700;font-size:11px;color:var(--ink3);}
  .roadmap{margin-top:20px;padding-top:18px;border-top:2px dashed #d9d0c2;}
  .rm-head{font-weight:800;font-size:13px;color:var(--ink2);margin-bottom:14px;}
  .rm-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .rm-badge{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .rm-medal{position:relative;width:62px;height:68px;display:flex;align-items:center;justify-content:center;clip-path:polygon(50% 0,100% 27%,100% 73%,50% 100%,0 73%,0 27%);background:linear-gradient(160deg,#dcd6cb,#b1a99a);border:0;color:#fff;font-size:26px;box-shadow:none;filter:drop-shadow(2px 3px 0 rgba(26,26,26,.25));}
  .rm-medal>i:first-child{opacity:.55;}
  .rm-lock{position:absolute;right:-2px;bottom:2px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid #fff;}
  .rm-name{font-weight:800;font-size:12.5px;color:var(--ink2);line-height:1.15;white-space:nowrap;}
  .rm-keys{display:inline-flex;align-items:center;gap:4px;font-weight:700;font-size:11px;color:var(--ink3);}
  .rm-keys i{font-size:13px;}
  @keyframes gemShine{0%,100%{filter:drop-shadow(2px 3px 0 var(--ink)) drop-shadow(0 0 7px rgba(245,200,66,.5));}50%{filter:drop-shadow(2px 3px 0 var(--ink)) drop-shadow(0 0 15px rgba(245,200,66,.92));}}

  /* stats hero */
  .stat-row{display:flex;gap:18px;margin-bottom:18px;}
  .stat-cover{width:208px;height:208px;flex:none;border-radius:14px;background:var(--cc);border:3px solid var(--ink);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff;font-size:60px;}
  .stat-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .stat-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .stat{background:var(--inset);border:2.5px solid var(--ink);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:2px;box-shadow:var(--shadow-sm);}
  .stat-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .stat-l{font-weight:600;font-size:12.5px;color:var(--ink2);}
  .trend{display:inline-flex;align-items:center;gap:3px;white-space:nowrap;font-weight:800;font-size:12px;border:2px solid var(--ink);border-radius:var(--pill);padding:2px 8px;}
  .trend i{font-size:14px;}
  .trend.up{background:#E1F5EE;color:#0E7A4B;}
  .trend.down{background:#FBE3E2;color:#C0392B;}
  .wk-note{margin-left:auto;font-weight:700;font-size:12px;color:var(--ink3);white-space:nowrap;}
  .stat b{font-size:26px;font-weight:800;letter-spacing:-.02em;}
  .stat span{font-weight:600;font-size:12.5px;color:var(--ink2);}

  /* release hero — bannière plein cadre */
  .hero.hero-release{position:relative;margin:32px 0;padding:0;overflow:hidden;min-height:520px;display:flex;flex-direction:column;justify-content:flex-end;background:var(--ink);box-shadow:none;border:none;}
  .rel-bg{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0;background-size:cover;background-position:center;}
  .rel-scrim{position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(90deg,rgba(8,8,10,.72) 0%,rgba(8,8,10,.38) 48%,rgba(8,8,10,0) 100%),linear-gradient(to top,rgba(8,8,10,.3),transparent 55%);}
  .rel-content{position:relative;z-index:2;max-width:560px;padding:46px 50px;color:#fff;display:flex;flex-direction:column;align-items:flex-start;}
  .rel-tag{position:absolute;top:22px;right:22px;z-index:3;display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#fff;background:var(--ink);border:none;border-radius:var(--pill);padding:7px 14px;box-shadow:none;}
  .rel-title{font-size:48px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1;margin-bottom:12px;text-shadow:0 2px 16px rgba(0,0,0,.55);}
  .rel-mech{font-weight:600;font-size:17px;color:rgba(255,255,255,.92);margin-bottom:24px;text-shadow:0 1px 10px rgba(0,0,0,.55);}
  .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:26px;width:100%;max-width:380px;}
  .metric{background:rgba(0,0,0,.42);border:none;border-radius:12px;padding:11px 12px;display:flex;flex-direction:column;gap:2px;}
  .metric b{font-size:21px;font-weight:800;color:#fff;}
  .metric span{font-weight:600;font-size:11.5px;color:rgba(255,255,255,.8);}
  .hero-release .hero-cta{background:var(--blue);}

  /* ---------- GAME POSTER CARDS ---------- */
  .shelf{display:grid;gap:22px;perspective:1050px;}
  #shelf1{grid-template-columns:repeat(4,1fr);}
  #shelf2{grid-template-columns:repeat(6,1fr);gap:18px;}

  /* ---- Top 5 communauté (boîtes 3D réalistes) ---- */
  #shelf1.topg{grid-template-columns:repeat(5,1fr);gap:24px;perspective:none;align-items:start;}
  .tg-card{display:flex;flex-direction:column;align-items:center;text-align:center;gap:2px;}
  .tg-stage{position:relative;display:flex;justify-content:center;padding:20px 12px 8px;}
  .tg-rank{position:absolute;top:-2px;left:6px;z-index:8;width:38px;height:38px;border-radius:50%;background:var(--yellow);color:var(--ink);border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;box-shadow:var(--shadow-sm);}
  .tg-box{position:relative;width:192px;height:214px;perspective:1000px;display:flex;align-items:center;justify-content:center;}
  .rb-shadow{position:absolute;bottom:8px;left:50%;width:124px;height:24px;transform:translateX(-50%);background:radial-gradient(50% 50% at 50% 50%,rgba(0,0,0,.34),transparent 72%);filter:blur(9px);z-index:0;}
  .rb-cube{position:relative;width:var(--w);height:var(--h);--w:158px;--h:186px;--d:32px;transform-style:preserve-3d;transform:translateY(-10px) rotateX(4deg) rotateY(17deg);transition:transform .25s ease;}
  .tg-card:hover .rb-cube{transform:translateY(-15px) rotateX(4deg) rotateY(12deg);}
  .rb-face{position:absolute;top:50%;left:50%;}
  .rb-front{width:var(--w);height:var(--h);transform:translate(-50%,-50%) translateZ(calc(var(--d)/2));border-radius:0;overflow:hidden;background:var(--cc);box-shadow:0 16px 26px rgba(0,0,0,.28);}
  .rb-front img{width:100%;height:100%;object-fit:cover;display:block;}
  .rb-ico{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.92);font-size:68px;}
  .rb-gloss{position:absolute;inset:0;background:linear-gradient(118deg,rgba(255,255,255,.28) 0%,rgba(255,255,255,0) 36%,rgba(255,255,255,0) 100%);pointer-events:none;}
  .rb-spine{width:var(--d);height:var(--h);transform:translate(-50%,-50%) rotateY(-90deg) translateZ(calc(var(--w)/2));background:linear-gradient(90deg,color-mix(in srgb,var(--cc) 40%,#000),color-mix(in srgb,var(--cc) 58%,#000));}
  .rb-top{width:var(--w);height:var(--d);transform:translate(-50%,-50%) rotateX(90deg) translateZ(calc(var(--h)/2));background:color-mix(in srgb,var(--cc) 70%,#000);}
  .tg-name{font-weight:800;font-size:15.5px;margin-top:6px;letter-spacing:-.01em;line-height:1.15;}
  .tg-rev{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-weight:600;font-size:12.5px;color:var(--ink2);margin-top:3px;}
  .tg-rev i{font-size:15px;color:#EFA417;}
  .tg-diff{display:inline-flex;align-items:center;gap:5px;margin-top:5px;white-space:nowrap;font-weight:800;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:#fff;background:var(--ink);border:none;border-radius:var(--pill);padding:5px 12px;box-shadow:none;}
  .tg-diff i{font-size:14px;}
  .gcard{position:relative;display:block;width:100%;aspect-ratio:3/4;border:none;border-radius:18px;overflow:hidden;cursor:pointer;background:var(--cc);box-shadow:var(--shadow-sm);font-family:var(--font);text-align:left;transition:box-shadow .18s ease, transform .12s ease;transform-style:preserve-3d;will-change:transform;}
  .gcard:hover{box-shadow:var(--shadow-lg);}
  .gcard.feat{box-shadow:0 0 0 3px var(--p);}
  .g-sm{border-radius:14px;}
  .gc-art{position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:flex-end;color:rgba(255,255,255,.16);overflow:hidden;pointer-events:none;}
  .gc-art i{font-size:190px;transform:translate(20%,-14%) rotate(-8deg);}
  .gc-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none;}
  .g-sm .gc-art i{font-size:120px;}
  .gc-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,7,5,.92) 0%,rgba(8,7,5,.55) 38%,rgba(8,7,5,.10) 70%);pointer-events:none;}
  .gc-body{position:absolute;left:0;right:0;bottom:0;padding:16px;display:flex;flex-direction:column;gap:3px;color:#fff;transform:translateZ(28px);}
  .g-sm .gc-body{padding:12px;}
  .gc-title{font-weight:800;font-size:21px;letter-spacing:-.01em;line-height:1.04;}
  .g-sm .gc-title{font-size:15px;}
  .gc-mech{font-weight:500;font-size:13px;color:rgba(255,255,255,.82);}
  .g-sm .gc-mech{font-size:11px;}
  .gc-meta{display:flex;flex-wrap:wrap;gap:14px;margin-top:9px;}
  .gc-meta .m{display:flex;align-items:center;gap:5px;white-space:nowrap;font-weight:700;font-size:13px;color:#fff;}
  .gc-meta .m i{font-size:16px;color:rgba(255,255,255,.72);}
  .gc-cta{margin-top:0;align-self:flex-start;display:inline-flex;align-items:center;gap:7px;font-family:var(--font);font-weight:800;font-size:13.5px;color:var(--ink);background:#fff;border:2px solid var(--ink);border-radius:var(--pill);padding:0 15px;max-height:0;opacity:0;overflow:hidden;transform:translateY(6px);transition:max-height .22s ease,margin-top .22s ease,padding .22s ease,opacity .18s,transform .18s;}
  .gcard:hover .gc-cta{opacity:1;transform:translateY(0);max-height:48px;margin-top:13px;padding-top:8px;padding-bottom:8px;}
  .gc-cta.solid{background:var(--p);color:#fff;}
  .g-sm .gc-cta{font-size:12px;padding-left:12px;padding-right:12px;}
  .gcard.g-sm:hover .gc-cta{margin-top:9px;padding-top:6px;padding-bottom:6px;}
  .cbadge{position:absolute;top:11px;left:11px;white-space:nowrap;font-weight:800;font-size:11.5px;letter-spacing:.02em;border:2px solid var(--ink);border-radius:var(--pill);padding:5px 11px;z-index:2;transform:translateZ(36px);}
  .g-sm .cbadge{font-size:10px;padding:4px 8px;top:8px;left:8px;}
  .t-p{background:var(--p);color:#fff;} .t-red{background:var(--red);color:#fff;} .t-soft{background:#fff;color:var(--ink);}
  .gc-add{position:absolute;top:11px;right:11px;z-index:3;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;color:var(--ink);border:2px solid var(--ink);box-shadow:var(--shadow-sm);font-size:20px;cursor:pointer;transition:transform .1s,background .12s,color .12s;}
  .gc-add:hover{transform:translate(-1px,-1px);}
  .gc-add:active{transform:translate(1px,1px);box-shadow:none;}
  .gc-add.added{background:var(--blue);color:#fff;}
  .g-sm .gc-add{width:30px;height:30px;font-size:18px;top:8px;right:8px;}

  /* ---------- SEPARATOR ---------- */
  .zig-sep{height:24px;margin:42px 0 8px;background:var(--p);
    -webkit-mask:linear-gradient(135deg,#000 50%,transparent 0) repeat-x 0 0/24px 24px,linear-gradient(-135deg,#000 50%,transparent 0) repeat-x 0 0/24px 24px;
    mask:linear-gradient(135deg,#000 50%,transparent 0) repeat-x 0 0/24px 24px,linear-gradient(-135deg,#000 50%,transparent 0) repeat-x 0 0/24px 24px;}

  /* ---------- LIBRARY ---------- */
  .lib-head{display:flex;align-items:center;gap:16px;margin-bottom:30px;flex-wrap:wrap;}
  .lib-head h2{font-size:24px;}
  .lib-sortwrap{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap;}
  #lib-sortlabel{font-weight:700;font-size:13px;color:var(--ink2);}
  #lib-sorts{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{font-family:var(--font);font-weight:700;font-size:13px;white-space:nowrap;color:var(--ink2);background:#fff;border:2px solid var(--ink);border-radius:var(--pill);box-shadow:var(--shadow-sm);padding:8px 14px;cursor:pointer;transition:transform .1s;}
  .chip:hover{transform:translate(-1px,-1px);}
  .chip.active{background:var(--blue);color:#fff;border-color:var(--ink);}
  .lib-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;perspective:1100px;}
  .lib-card{display:flex;flex-direction:column;background:#fff;border:2px solid var(--ink);border-radius:18px;box-shadow:var(--shadow-sm);overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .12s;}
  .lib-card:hover{transform:translate(-3px,-3px);box-shadow:var(--shadow);}
  .lc-img{position:relative;aspect-ratio:4/3;background:var(--inset);border-bottom:2px solid var(--ink);display:flex;align-items:center;justify-content:center;}
  .lc-cover{width:62%;aspect-ratio:1;border-radius:14px;background:var(--cc);border:2px solid var(--ink);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:54px;}
  .lc-badge{position:absolute;top:10px;left:10px;font-weight:800;font-size:11.5px;letter-spacing:.02em;background:var(--p);color:#fff;border:2px solid var(--ink);border-radius:var(--pill);padding:5px 11px;box-shadow:var(--shadow-sm);}
  .lc-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(26,26,26,0);opacity:0;transition:opacity .14s,background .14s;}
  .lib-card:hover .lc-play{opacity:1;background:rgba(26,26,26,.32);}
  .lc-play span{width:54px;height:54px;border-radius:50%;background:var(--p);border:2.5px solid #fff;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;}
  .lc-body{padding:16px 18px 18px;display:flex;flex-direction:column;}
  .lc-title{font-weight:800;font-size:18px;letter-spacing:-.01em;}
  .lc-mech{font-weight:500;font-size:13px;color:var(--ink2);margin-top:3px;}
  .lc-meta{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;padding-top:13px;border-top:2px solid var(--ink);}
  .lc-meta .m{display:flex;align-items:center;gap:6px;white-space:nowrap;font-weight:700;font-size:14px;color:var(--ink);}
  .lc-meta .m i{font-size:18px;color:var(--ink2);}

  .footer-space{height:60px;}

  /* ---- modale de configuration de partie ---- */
  /* ---- modale de récompense : clef débloquée ---- */
  #reward-modal{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;background:rgba(20,16,12,.72);overflow:hidden;padding:24px;}
  #reward-modal[hidden]{display:none;}
  .kx-burst{position:absolute;width:560px;height:560px;max-width:140vw;max-height:140vw;z-index:0;pointer-events:none;opacity:.5;
    background:repeating-conic-gradient(from 0deg, rgba(245,200,66,.22) 0 7deg, transparent 7deg 18deg);
    -webkit-mask:radial-gradient(closest-side, #000 30%, transparent 72%);mask:radial-gradient(closest-side, #000 30%, transparent 72%);
    animation:kxspin 16s linear infinite;}
  @keyframes kxspin{to{transform:rotate(360deg);}}
  .kx-card{position:relative;z-index:2;opacity:1;display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center;color:var(--ink);background:var(--bg);border:3px solid var(--ink);border-radius:22px;box-shadow:8px 8px 0 0 var(--ink);padding:30px 34px 26px;max-width:380px;animation:kxcard .4s cubic-bezier(.2,.8,.3,1.2) both;}
  @keyframes kxcard{from{transform:translateY(16px) scale(.94);}to{transform:none;}}
  .kx-gemwrap{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
  .kx-glow{position:absolute;inset:-6px;border-radius:50%;z-index:0;background:radial-gradient(closest-side, rgba(245,200,66,.6), transparent 70%);animation:kxglow 1.8s ease-in-out infinite;}
  @keyframes kxglow{0%,100%{opacity:.45;transform:scale(.92);}50%{opacity:1;transform:scale(1.1);}}
  .kx-gem{position:relative;z-index:2;width:112px;height:122px;display:flex;align-items:center;justify-content:center;transform-origin:center;animation:kxpop .5s cubic-bezier(.2,.9,.3,1.35), kxwiggle 2.6s ease-in-out .55s infinite;}
  .kx-gem .rim,.kx-gem .face,.kx-gem .gloss{position:absolute;clip-path:polygon(50% 0,100% 27%,100% 73%,50% 100%,0 73%,0 27%);}
  .kx-gem .rim{inset:0;background:var(--ink);}
  .kx-gem .face{inset:4px;background:radial-gradient(120% 100% at 35% 22%,#ffe27a,#e8a90f 72%);}
  .kx-gem i{position:relative;z-index:3;color:#fff;font-size:50px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3));}
  .kx-gem .gloss{inset:4px;z-index:4;overflow:hidden;}
  .kx-gem .gloss::after{content:"";position:absolute;top:-25%;left:0;width:42%;height:150%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.85),transparent);transform:skewX(-18deg);animation:kxshine 2.4s ease-in-out .8s infinite;}
  @keyframes kxpop{0%{transform:scale(.55) rotate(-12deg);}60%{transform:scale(1.12) rotate(5deg);}100%{transform:scale(1) rotate(0);}}
  @keyframes kxwiggle{0%,100%{transform:rotate(-3.5deg);}50%{transform:rotate(3.5deg);}}
  @keyframes kxshine{0%{transform:translateX(-130%) skewX(-18deg);}55%,100%{transform:translateX(260%) skewX(-18deg);}}
  .kx-spark{position:absolute;width:14px;height:14px;z-index:3;background:var(--yellow);
    clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%);opacity:0;animation:kxsparkle 1.6s ease-in-out infinite;}
  .kx-spark.s1{top:4px;left:18px;animation-delay:.2s;} .kx-spark.s2{top:0;right:24px;animation-delay:.7s;width:10px;height:10px;}
  .kx-spark.s3{bottom:14px;left:6px;animation-delay:1.1s;width:11px;height:11px;} .kx-spark.s4{bottom:6px;right:14px;animation-delay:.45s;}
  .kx-spark.s5{top:46px;left:-6px;animation-delay:.9s;width:9px;height:9px;} .kx-spark.s6{top:40px;right:-4px;animation-delay:1.35s;width:12px;height:12px;}
  @keyframes kxsparkle{0%,100%{opacity:0;transform:scale(.3) rotate(0);}50%{opacity:1;transform:scale(1) rotate(35deg);}}
  .kx-kicker{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--blue-d);}
  .kx-title{font-weight:800;font-size:25px;letter-spacing:-.01em;line-height:1.08;}
  .kx-sub{font-weight:600;font-size:13.5px;color:var(--ink2);margin-top:2px;}
  .kx-cta{margin-top:16px;display:inline-flex;align-items:center;gap:9px;font-family:var(--font);font-weight:800;font-size:15px;color:#fff;background:var(--blue);border:3px solid var(--ink);border-radius:var(--pill);padding:12px 24px;cursor:pointer;box-shadow:4px 4px 0 0 var(--ink);}
  .kx-card{max-height:92vh;overflow:auto;}
  .kxg{width:100%;margin-top:14px;}
  .kxg-row{display:flex;align-items:center;gap:0;}
  .kxg-key{flex:none;width:30px;height:30px;border-radius:50%;border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;background:linear-gradient(160deg,#dcd6cb,#b1a99a);position:relative;z-index:2;box-shadow:2px 2px 0 0 var(--ink);}
  .kxg-key.done{background:radial-gradient(120% 100% at 35% 25%,#ffe27a,#e8a90f 72%);animation:kxkeywin .7s cubic-bezier(.2,.9,.3,1.4) .55s both;}
  @keyframes kxkeywin{0%{transform:scale(1);}45%{transform:scale(1.45);box-shadow:0 0 14px 2px rgba(245,200,66,.9),2px 2px 0 0 var(--ink);}100%{transform:scale(1);}}
  .kxg-seg{flex:1;height:12px;margin:0 -4px;border-radius:99px;border:2.5px solid var(--ink);background:var(--inset);position:relative;overflow:hidden;z-index:1;}
  .kxg-segfill{position:absolute;inset:0;background:linear-gradient(180deg,#ffd863,#f0b21f);transform-origin:left;transform:scaleX(0);animation:kxsegfill .9s ease .5s forwards;}
  @keyframes kxsegfill{to{transform:scaleX(1);}}
  .kxg-badge{flex:none;width:36px;height:36px;border-radius:50%;border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;background:linear-gradient(160deg,#dcd6cb,#b1a99a);position:relative;z-index:2;box-shadow:2px 2px 0 0 var(--ink);}
  .kx-nb-lock,.kxg-badge .kx-nb-lock{position:absolute;right:-4px;bottom:-4px;width:17px;height:17px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;border:2px solid #fff;}
  .kxg-label{font-weight:600;font-size:12.5px;color:var(--ink2);margin-top:9px;}
  .kxg-label b{font-weight:800;color:var(--ink);}
  .kx-next{width:100%;margin-top:16px;padding-top:14px;border-top:2px dashed #d9d0c2;}
  .kx-next-head{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink3);margin-bottom:11px;}
  .kx-next-row{display:flex;justify-content:center;gap:16px;}
  .kx-nb{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .kx-nb-medal{position:relative;width:42px;height:42px;border-radius:50%;border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;background:linear-gradient(160deg,#dcd6cb,#b1a99a);box-shadow:2px 2px 0 0 var(--ink);}
  .kx-nb-medal>i:first-child{opacity:.6;}
  .kx-nb-name{font-weight:700;font-size:11px;color:var(--ink3);white-space:nowrap;}
  .kx-cta:hover{background:var(--blue-d);}
  .kx-cta:active{transform:translate(3px,3px);box-shadow:0 0 0 0 var(--ink);}

  /* ---- écran de transition (partie en cours) ---- */
  #launch-screen{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#141109;}
  #launch-screen[hidden]{display:none;}
  .lx-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(26px) brightness(.38);transform:scale(1.15);}
  .lx-card{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:24px;text-align:center;color:#fff;padding:28px;}
  .lx-cover{width:220px;max-width:62vw;}
  .lx-cover img{width:100%;height:auto;display:block;border:3px solid #000;border-radius:16px;box-shadow:0 22px 50px rgba(0,0,0,.6);}
  .lx-ico{width:160px;height:160px;border-radius:18px;background:var(--cc);border:3px solid #000;display:flex;align-items:center;justify-content:center;color:#fff;font-size:80px;box-shadow:0 22px 50px rgba(0,0,0,.6);}
  .lx-spin{width:52px;height:52px;border-radius:50%;border:5px solid rgba(255,255,255,.22);border-top-color:var(--blue);animation:lxspin .9s linear infinite;}
  @keyframes lxspin{to{transform:rotate(360deg);}}
  .lx-title{font-weight:800;font-size:26px;letter-spacing:-.01em;}
  .lx-sub{font-weight:600;font-size:15px;color:rgba(255,255,255,.82);margin-top:4px;}
  .lx-finish{display:inline-flex;align-items:center;gap:9px;font-family:var(--font);font-weight:800;font-size:16px;color:#fff;background:var(--blue);border:3px solid #000;border-radius:var(--pill);padding:13px 26px;cursor:pointer;box-shadow:5px 5px 0 0 #000;animation:lxpop .3s cubic-bezier(.2,.8,.3,1.2);}
  .lx-finish[hidden]{display:none;}
  .lx-finish:hover{background:var(--blue-d);}
  .lx-finish:active{transform:translate(3px,3px);box-shadow:0 0 0 0 #000;}
  @keyframes lxpop{from{opacity:0;transform:translateY(10px) scale(.9);}to{opacity:1;transform:none;}}

  /* ---- modale de configuration de partie ---- */
  .modal-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(20,16,12,.55);}
  .modal-overlay[hidden]{display:none;}
  .setup-sheet{width:100%;max-width:470px;max-height:90vh;overflow:auto;background:var(--bg);border:3px solid var(--ink);border-radius:18px;box-shadow:8px 8px 0 0 var(--ink);}
  .setup-head{position:relative;display:flex;gap:14px;align-items:center;padding:20px 20px 16px;border-bottom:2.5px solid var(--ink);}
  .setup-cover{width:62px;height:62px;flex:none;border-radius:12px;overflow:hidden;background:var(--cc);border:2.5px solid var(--ink);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;}
  .setup-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .setup-titles{flex:1;min-width:0;padding-right:30px;}
  .setup-kicker{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--blue-d);}
  .setup-head h3{font-size:21px;font-weight:800;letter-spacing:-.01em;margin-top:3px;line-height:1.05;}
  .setup-head p{font-weight:600;font-size:13px;color:var(--ink2);margin-top:3px;}
  .setup-x{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:2px solid var(--ink);background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .setup-x:hover{transform:translate(-1px,-1px);}
  .setup-body{padding:18px 20px;display:flex;flex-direction:column;gap:18px;}
  .set-block{display:flex;flex-direction:column;gap:8px;}
  .set-lbl{font-weight:800;font-size:13px;}
  .set-lbl-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .fquick{display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-weight:800;font-size:11.5px;color:var(--blue-d);background:#E6F1FB;border:2px solid var(--blue);border-radius:var(--pill);padding:5px 11px;cursor:pointer;transition:transform .1s;}
  .fquick i{font-size:14px;}
  .fquick:hover{transform:translateY(-1px);}
  .set-friends{display:flex;flex-wrap:wrap;gap:8px;}
  .fchip{display:inline-flex;align-items:center;gap:7px;border:2px solid var(--ink);border-radius:var(--pill);padding:4px 13px 4px 4px;background:#fff;cursor:pointer;font-family:var(--font);font-weight:700;font-size:13px;color:var(--ink);transition:transform .1s,background .12s,color .12s;}
  .fchip:hover{transform:translateY(-1px);}
  .fchip .fav{position:relative;width:28px;height:28px;border-radius:50%;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;}
  .fchip .fdot{position:absolute;right:-3px;bottom:-3px;width:11px;height:11px;border-radius:50%;background:#13CC63;border:2px solid var(--ink);}
  .fchip.on{background:var(--blue);color:#fff;}
  .fchip.on .fav{border-color:#fff;}
  .fchip.off{opacity:.55;}
  .set-help{font-weight:500;font-size:12px;color:var(--ink2);margin-top:1px;}
  .seg-ctl{display:flex;gap:6px;}
  .seg-opt{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font);font-weight:700;font-size:13px;color:var(--ink);background:#fff;border:2px solid var(--ink);border-radius:var(--pill);padding:9px 8px;cursor:pointer;transition:transform .1s,background .12s,color .12s;}
  .seg-opt i{font-size:16px;}
  .seg-opt .so-txt{display:flex;flex-direction:column;align-items:center;line-height:1.12;}
  .seg-opt .so-txt small{font-weight:600;font-size:9.5px;opacity:.72;margin-top:1px;}
  .seg-opt:hover{transform:translateY(-1px);}
  .seg-opt.on{background:var(--blue);color:#fff;}
  .stepper{display:inline-flex;align-items:center;align-self:flex-start;border:2.5px solid var(--ink);border-radius:var(--pill);overflow:hidden;box-shadow:var(--shadow-sm);}
  .stepper button{width:44px;height:40px;border:none;background:#fff;font-size:22px;font-weight:800;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;color:var(--ink);}
  .stepper button:hover:not(:disabled){background:var(--inset);}
  .stepper button:disabled{opacity:.3;cursor:not-allowed;}
  .stepper span{min-width:56px;text-align:center;font-weight:800;font-size:17px;border-left:2.5px solid var(--ink);border-right:2.5px solid var(--ink);height:40px;display:flex;align-items:center;justify-content:center;}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .toggles{gap:14px;}
  .switch{flex:none;width:50px;height:28px;border-radius:99px;border:2.5px solid var(--ink);background:#d9d0c2;position:relative;cursor:pointer;transition:background .14s;padding:0;}
  .switch span{position:absolute;top:1px;left:1px;width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--ink);transition:transform .14s;}
  .switch.on{background:var(--blue);}
  .switch.on span{transform:translateX(22px);}
  .setup-foot{display:flex;gap:10px;padding:16px 20px;border-top:2.5px solid var(--ink);position:sticky;bottom:0;background:var(--bg);}
  .btn-ghost{flex:none;font-family:var(--font);font-weight:800;font-size:14px;color:var(--ink);background:#fff;border:2.5px solid var(--ink);border-radius:var(--pill);padding:11px 18px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .btn-ghost:hover{transform:translate(-1px,-1px);}
  .btn-primary{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);font-weight:800;font-size:15px;color:#fff;background:var(--blue);border:2.5px solid var(--ink);border-radius:var(--pill);padding:11px 18px;cursor:pointer;box-shadow:var(--shadow);}
  .btn-primary:hover{background:var(--blue-d);}
  .btn-primary:active{transform:translate(3px,3px);box-shadow:0 0 0 0 var(--ink);}

  /* toast */
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-weight:700;font-size:14px;padding:13px 22px;border-radius:var(--pill);box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;z-index:60;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
