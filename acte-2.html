<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BGA · Acte 2 — Personnalité</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,700;12..96,800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#f5f0eb; --surface:#ffffff;
    --ink:#1a1a1a; --ink2:#4a4a4a;
    --blue:#04a7ff; --blue-d:#164d73; --blue-soft:#E6F1FB;
    --yellow:#F5C842; --yellow-soft:#FCEFC7; --red:#E53935;
    --shadow:4px 4px 0 0 var(--ink);
    --shadow-sm:3px 3px 0 0 var(--ink);
    --shadow-lg:6px 6px 0 0 var(--ink);
    --r:14px; --pill:99px;
    --font:'Bricolage Grotesque',system-ui,sans-serif;
  }
  html{scroll-behavior:smooth;}
  body{width:1440px;min-height:900px;position:relative;
    background:var(--bg);font-family:var(--font);color:var(--ink);padding-bottom:118px;}

  header{display:flex;align-items:center;justify-content:space-between;padding:22px 56px 0;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{width:44px;height:44px;background:var(--blue);border:3px solid var(--ink);border-radius:12px;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;transform:rotate(-5deg);}
  .brand .name{font-weight:800;font-size:20px;letter-spacing:-.02em;}
  .brand .name b{color:var(--blue);}
  .lang{display:inline-flex;border:3px solid var(--ink);border-radius:var(--pill);overflow:hidden;background:#fff;box-shadow:var(--shadow-sm);}
  .lang button{font-family:var(--font);font-weight:700;font-size:14px;letter-spacing:.04em;padding:9px 18px;border:none;cursor:pointer;background:transparent;color:var(--ink2);transition:background .12s,color .12s;}
  .lang button.active{background:var(--ink);color:#fff;}

  .rail{display:flex;justify-content:center;gap:8px;padding:16px 0 4px;}
  .rail .step{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:var(--ink2);padding:7px 14px;border:2.5px solid transparent;border-radius:var(--pill);}
  .rail .step .num{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--ink2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .rail .step.done{color:var(--ink);cursor:pointer;transition:transform .12s;}
  .rail .step.done:hover{transform:translate(-1px,-1px);}
  .rail .step.done .num{background:var(--blue);border-color:var(--ink);color:#fff;}
  .rail .step.active{background:var(--yellow);border-color:var(--ink);color:var(--ink);box-shadow:var(--shadow-sm);}
  .rail .step.active .num{border-color:var(--ink);background:var(--ink);color:#fff;}
  .rail .sep{align-self:center;color:#cdc4b6;font-size:18px;}

  /* sticky progress + intro */
  .sticky-top{position:sticky;top:0;z-index:20;background:var(--bg);padding:14px 0 14px;border-bottom:3px solid transparent;transition:border-color .15s,box-shadow .15s;}
  .sticky-top.stuck{border-color:var(--ink);box-shadow:0 6px 0 -3px rgba(26,26,26,.08);}
  .intro{text-align:center;font-weight:800;font-size:26px;letter-spacing:-.02em;margin-bottom:12px;}
  .intro span{color:var(--blue);}
  .dots{display:flex;align-items:center;justify-content:center;gap:13px;}
  .dots .dot{width:38px;height:38px;border-radius:50%;border:3px solid var(--ink);background:var(--surface);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--ink2);
    cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s,background .12s,color .12s;}
  .dots .dot:hover{transform:translate(-1px,-1px);}
  .dots .dot.answered{background:var(--blue);color:#fff;}
  .dots .dot.current{background:var(--yellow);color:var(--ink);transform:scale(1.12);}
  .dots .bar{width:42px;height:3px;background:var(--ink);opacity:.32;border-radius:2px;}

  main{max-width:900px;margin:0 auto;padding:22px 56px 0;display:flex;flex-direction:column;gap:26px;}

  .qcard{scroll-margin-top:120px;background:var(--surface);border:3px solid var(--ink);border-radius:22px;
    box-shadow:var(--shadow-lg);padding:28px 36px 32px;}
  .qhead{display:flex;align-items:center;gap:12px;margin-bottom:15px;}
  .qhead .qn{font-family:var(--font);font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    background:var(--ink);color:#fff;padding:6px 12px;border-radius:var(--pill);white-space:nowrap;}
  .qhead .qtitle{font-weight:800;font-size:21px;letter-spacing:-.01em;white-space:nowrap;}
  .qhead .qok{margin-left:auto;display:none;align-items:center;gap:7px;font-weight:700;font-size:13px;color:var(--blue);}
  .qcard.done .qhead .qok{display:flex;}
  .qhead .qok i{font-size:19px;}

  .quote{position:relative;background:var(--yellow-soft);border:2.5px solid var(--ink);border-left-width:8px;border-radius:12px;
    padding:16px 22px 16px 54px;margin-bottom:18px;}
  .quote .qmark{position:absolute;left:16px;top:13px;font-size:26px;color:var(--blue);}
  .quote p{font-weight:500;font-size:17px;line-height:1.45;color:var(--ink);font-style:italic;}

  .ask{font-weight:800;font-size:19px;margin-bottom:15px;}

  .opts{display:flex;gap:18px;}
  .opt{flex:1;position:relative;display:flex;align-items:flex-start;gap:14px;text-align:left;cursor:pointer;font-family:var(--font);
    background:var(--surface);border:3px solid var(--ink);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 18px;
    transition:transform .13s,box-shadow .13s,background .13s,color .13s;}
  .opt:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 0 var(--ink);}
  .opt .radio{width:26px;height:26px;flex:none;border-radius:50%;border:3px solid var(--ink);background:#fff;margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:border-color .13s,background .13s;}
  .opt .radio::after{content:"";width:12px;height:12px;border-radius:50%;background:transparent;transition:background .13s;}
  .opt .otext{font-weight:600;font-size:16px;line-height:1.4;}
  .opt.sel{background:var(--blue);color:#fff;box-shadow:6px 6px 0 0 var(--ink);transform:scale(1.02);}
  .opt.sel .radio{border-color:#fff;background:var(--blue);}
  .opt.sel .radio::after{background:#fff;}

  /* fixed footer bar */
  .footer{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--surface);border-top:3px solid var(--ink);
    box-shadow:0 -4px 0 0 rgba(26,26,26,.06);}
  .footer-in{max-width:1140px;margin:0 auto;padding:16px 56px;display:flex;align-items:center;justify-content:space-between;gap:20px;}
  .prog{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;color:var(--ink2);}
  .prog .pbar{display:block;width:150px;height:12px;border:2.5px solid var(--ink);border-radius:var(--pill);background:var(--bg);overflow:hidden;}
  .prog .pfill{display:block;height:100%;width:0;background:var(--blue);transition:width .3s ease;}
  .prog.ok{color:var(--blue);}
  .actions{display:flex;align-items:center;gap:14px;}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--font);font-weight:800;font-size:16px;
    border:3px solid var(--ink);border-radius:var(--pill);box-shadow:var(--shadow);padding:13px 26px;cursor:pointer;white-space:nowrap;
    transition:transform .11s,box-shadow .11s,background .11s,color .11s;}
  .btn i{font-size:20px;}
  .btn.ghost{background:var(--surface);color:var(--ink);}
  .btn.ghost:hover{background:var(--blue-soft);}
  .btn.primary{background:var(--blue);color:#fff;}
  .btn.primary:not(:disabled):hover{background:var(--blue-d);}
  .btn:not(:disabled):active{transform:translate(4px,4px);box-shadow:0 0 0 0 var(--ink);}
  .btn.primary:disabled{background:#cfc6b8;cursor:not-allowed;}
</style>
</head>
<body>
  <header>
    <div class="brand"><img src="assets/logo.svg" alt="Boardgame Arena" style="height:42px;width:auto;display:block;" /></div>
    <div class="lang" id="lang"><button data-lang="fr" class="active">FR</button><button data-lang="en">EN</button></div>
  </header>

  <nav class="rail">
    <span class="step done" data-href="accueil.html"><span class="num"><i class="ti ti-check"></i></span><span data-i18n="r0">Accueil</span></span>
    <span class="sep"><i class="ti ti-chevron-right"></i></span>
    <span class="step done" data-href="acte-1.html"><span class="num"><i class="ti ti-check"></i></span><span data-i18n="r1">Préférences</span></span>
    <span class="sep"><i class="ti ti-chevron-right"></i></span>
    <span class="step active"><span class="num">2</span><span data-i18n="r2">Personnalité</span></span>
    <span class="sep"><i class="ti ti-chevron-right"></i></span>
    <span class="step"><span class="num">3</span><span data-i18n="r3">Profil</span></span>
  </nav>

  <div class="sticky-top" id="stickyTop">
    <div class="intro" id="intro">Trois situations. <span>Deux choix.</span></div>
  </div>

  <main id="qlist"></main>

  <div class="footer">
    <div class="footer-in">
      <button class="btn ghost" id="back"><i class="ti ti-arrow-left"></i><span data-i18n="back">Précédent</span></button>
      <div class="actions">
        <span class="prog" id="prog"><span class="pbar"><span class="pfill" id="pfill"></span></span><span id="progTxt">0/3</span></span>
        <button class="btn primary" id="go" disabled><span data-i18n="cta">Découvrir mon profil</span><i class="ti ti-arrow-up-right"></i></button>
      </div>
    </div>
  </div>

<script>
  const Q=[
    {id:'adversaire',
      title:{fr:"L'adversaire",en:"The opponent"},
      quote:{fr:"Ton adversaire vient de faire une erreur qu'il n'a pas remarquée. Si tu la signales, il peut la corriger. Sinon, tu gagnes.",
             en:"Your opponent just made a mistake they didn't notice. Point it out and they can fix it. Stay quiet and you win."},
      ask:{fr:"Tu fais quoi ?",en:"What do you do?"},
      l:{fr:"Je ne dis rien — c'est à lui d'être attentif.",en:"I say nothing — it's on them to stay sharp.",axis:'system'},
      r:{fr:"Je le préviens — je veux gagner contre son meilleur jeu.",en:"I warn them — I want to win against their best game.",axis:'users'}},
    {id:'regle',
      title:{fr:"La règle inconnue",en:"The unknown rules"},
      quote:{fr:"Nouvelle partie. Personne ne connaît le jeu. Le manuel fait 12 pages.",
             en:"New game. Nobody knows it. The rulebook is 12 pages long."},
      ask:{fr:"Ta réaction ?",en:"Your move?"},
      l:{fr:"Je lis tout d'abord — respecter les règles, c'est respecter le jeu.",en:"I read it all first — respecting the rules respects the game.",axis:'structured'},
      r:{fr:"On découvre en jouant — les règles s'apprennent en situation.",en:"We learn by playing — rules click in the moment.",axis:'free'}},
    {id:'defaite',
      title:{fr:"La défaite",en:"The defeat"},
      quote:{fr:"Tu viens de perdre une partie que tu pensais gagner. L'adversaire était meilleur.",
             en:"You just lost a game you thought you'd win. Your opponent was simply better."},
      ask:{fr:"Et maintenant ?",en:"And now?"},
      l:{fr:"J'analyse ce qui a raté — pour ne plus refaire l'erreur.",en:"I analyse what went wrong — so I never repeat it.",axis:'progress'},
      r:{fr:"Je félicite et je passe — le moment compte plus que le score.",en:"I congratulate them and move on — the moment matters more than the score.",axis:'help'}},
  ];

  const I18N={
    fr:{r0:'Accueil',r1:'Préférences',r2:'Personnalité',r3:'Profil',
      intro:'Trois situations. <span>Deux choix.</span>',back:'Précédent',cta:'Découvrir mon profil',done:'Répondu'},
    en:{r0:'Welcome',r1:'Preferences',r2:'Personality',r3:'Profile',
      intro:'Three situations. <span>Two choices.</span>',back:'Back',cta:'Reveal my profile',done:'Answered'}
  };

  function computeProfile(ans){
    const a1=Q[0][ans[0]].axis, a2=Q[1][ans[1]].axis, a3=Q[2][ans[2]].axis;
    if(a1==='system') return a2==='structured'?'achiever':'freespirit';
    return a3==='progress'?'socialiser':'philanthropist';
  }

  let lang='fr';
  const ans=[null,null,null];
  const qlist=document.getElementById('qlist'),
        go=document.getElementById('go'),prog=document.getElementById('prog'),progTxt=document.getElementById('progTxt'),
        pfill=document.getElementById('pfill'),stickyTop=document.getElementById('stickyTop');

  function build(){
    qlist.innerHTML='';
    Q.forEach((q,i)=>{
      const card=document.createElement('section');card.className='qcard';card.id='q'+i;
      card.innerHTML=`
        <div class="qhead">
          <span class="qn">${String(i+1).padStart(2,'0')} / 03</span>
          <span class="qtitle" data-f="title"></span>
          <span class="qok"><i class="ti ti-circle-check-filled"></i><span data-f="ok"></span></span>
        </div>
        <div class="quote"><i class="ti ti-quote qmark"></i><p data-f="quote"></p></div>
        <div class="ask" data-f="ask"></div>
        <div class="opts">
          <button type="button" class="opt" data-side="l"><span class="radio"></span><span class="otext" data-f="l"></span></button>
          <button type="button" class="opt" data-side="r"><span class="radio"></span><span class="otext" data-f="r"></span></button>
        </div>`;
      card.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>{
        ans[i]=o.dataset.side; paintState(); }));
      qlist.appendChild(card);
    });
  }

  function paintText(){
    const d=I18N[lang];
    document.documentElement.lang=lang;
    document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(d[k]!=null)el.textContent=d[k];});
    document.getElementById('intro').innerHTML=d.intro;
    Q.forEach((q,i)=>{
      const c=document.getElementById('q'+i);
      c.querySelector('[data-f="title"]').textContent=q.title[lang];
      c.querySelector('[data-f="quote"]').textContent='« '+q.quote[lang]+' »';
      c.querySelector('[data-f="ask"]').textContent=q.ask[lang];
      c.querySelector('[data-f="l"]').textContent=q.l[lang];
      c.querySelector('[data-f="r"]').textContent=q.r[lang];
      c.querySelector('[data-f="ok"]').textContent=d.done;
    });
  }

  function paintState(){
    Q.forEach((q,i)=>{
      const c=document.getElementById('q'+i);
      c.classList.toggle('done',ans[i]!==null);
      c.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel',o.dataset.side===ans[i]));
    });
    const n=ans.filter(a=>a!==null).length, all=n===Q.length;
    progTxt.textContent=n+'/'+Q.length;
    pfill.style.width=(n/Q.length*100)+'%';
    prog.classList.toggle('ok',all);
    go.disabled=!all;
  }

  go.addEventListener('click',()=>{
    if(!ans.every(a=>a!==null))return;
    const profile=computeProfile(ans);
    try{localStorage.setItem('bga_personality',JSON.stringify(ans));localStorage.setItem('bga_profile',profile);}catch(e){}
    window.location.href='acte-3.html';
  });
  document.getElementById('back').addEventListener('click',()=>{window.location.href='acte-1.html';});
  document.querySelectorAll('.rail .step[data-href]').forEach(s=>s.addEventListener('click',()=>{window.location.href=s.dataset.href;}));
  document.querySelectorAll('#lang button').forEach(b=>b.addEventListener('click',()=>{
    lang=b.dataset.lang;document.querySelectorAll('#lang button').forEach(x=>x.classList.toggle('active',x===b));
    paintText();try{localStorage.setItem('bga_lang',lang);}catch(e){}}));

  // sticky shadow when scrolled
  window.addEventListener('scroll',()=>{stickyTop.classList.toggle('stuck',window.scrollY>90);});

  try{lang=localStorage.getItem('bga_lang')||'fr';
    document.querySelectorAll('#lang button').forEach(x=>x.classList.toggle('active',x.dataset.lang===lang));}catch(e){}
  build();paintText();paintState();
</script>
</body>
</html>
